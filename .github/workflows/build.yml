name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable

      - name: Create Android scaffolding
        run: flutter create --platforms=android --org com.tysu --project-name fithome .

      - name: Patch Android files (notifications support)
        run: python3 tool/patch_android.py

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk fithome.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fithome-apk
          path: fithome.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FitHome build ${{ github.run_number }}
          files: fithome.apk
